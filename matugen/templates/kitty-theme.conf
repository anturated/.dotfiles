# vim:ft=kitty
#: This is a template that can be used to create new kitty themes.
#: Theme files should start with a metadata block consisting of
#: lines beginning with ##. All metadata fields are optional.

## name: Fishy
## author: Desant
## license: MIT
## upstream: A URL pointing to the location of this file upstream for auto-updates
## blurb: fih

#: All the settings below are colors, which you can choose to modify, or use the
#: defaults. You can also add non-color based settings if needed but note that
#: these will not work with using kitty @ set-colors with this theme. For a
#: reference on what these settings do see https://sw.kovidgoyal.net/kitty/conf/

#: The basic colors

foreground                      {{colors.on_background.default.hex}}
background                      {{colors.background.default.hex}}
selection_foreground            {{colors.background.default.hex}}
selection_background            {{colors.on_background.default.hex}}


#: Cursor colors

cursor                          {{colors.on_surface.default.hex}}
cursor_text_color               {{colors.surface.default.hex}}


#: URL underline color when hovering with mouse

url_color                       {{colors.secondary.default.hex}}


#: kitty window border colors and terminal bell colors

active_border_color             #00ff00
inactive_border_color           #cccccc
bell_border_color               #ff5a00
visual_bell_color               none


#: OS Window titlebar colors

wayland_titlebar_color          system
macos_titlebar_color            system


#: Tab bar colors

active_tab_foreground           {{colors.background.default.hex}}
active_tab_background           {{colors.primary.default.hex}}
inactive_tab_foreground         {{colors.background.default.hex}}
inactive_tab_background         {{colors.primary_container.default.hex}}
tab_bar_background              none
tab_bar_margin_color            none


#: Colors for marks (marked text in the terminal)

mark1_foreground black
mark1_background #98d3cb
mark2_foreground black
mark2_background #f2dcd3
mark3_foreground black
mark3_background #f274bc


#: The basic 16 colors

#: black
color0 {{colors.on_primary_container.default.hex}}
color8 {{colors.on_primary_container.default.hex}}

#: red
color1 {{colors.primary.default.hex}}
color9 {{colors.primary.default.hex}}

#: green
color2  {{colors.secondary.default.hex}}
color10 {{colors.secondary.default.hex}}

#: yellow
color3  {{colors.tertiary.default.hex}}
color11 {{colors.tertiary.default.hex}}

#: blue
color4  {{colors.primary.default.hex}}
color12 {{colors.primary.default.hex}}

#: magenta
color5  {{colors.secondary.default.hex}}
color13 {{colors.secondary.default.hex}}

#: cyan
color6  {{colors.tertiary.default.hex}}
color14 {{colors.tertiary.default.hex}}

#: white
color7  {{colors.on_background.default.hex}}
color15 {{colors.on_background.default.hex}}


#: You can set the remaining 240 colors as color16 to color255.
